<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - House AI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
        }

        /* BOX */
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        /* TITLE */
        .login-box h2 {
            margin-bottom: 25px;
            color: #333;
        }

        /* INPUT */
        .input-box {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-box label {
            font-size: 14px;
            color: #555;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79, 172, 254, 0.4);
        }

        /* ERROR */
        .error {
            color: red;
            font-size: 13px;
            margin-top: 3px;
        }

        /* BUTTON */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(to right, #4facfe, #00c6ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* MESSAGE */
        #message {
            margin-top: 10px;
            font-size: 14px;
        }

        /* LINK */
        .link {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Đăng nhập</h2>

        <form id="loginForm">
            <div class="input-box">
                <label>Tên đăng nhập</label>
                <input type="text" id="username">
                <div id="usernameError" class="error"></div>
            </div>

            <div class="input-box">
                <label>Mật khẩu</label>
                <input type="password" id="password">
                <div id="passwordError" class="error"></div>
            </div>

            <button class="btn" type="submit">Đăng nhập</button>
        </form>

        <p id="message"></p>

        <div class="link">
            Chưa có tài khoản? <a href="register.html">Đăng ký</a>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            // reset lỗi
            document.getElementById("message").innerText = "";
            document.getElementById("usernameError").innerText = "";
            document.getElementById("passwordError").innerText = "";

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            // 🔥 VALIDATE FRONTEND
            let hasError = false;

            if (!username) {
                document.getElementById("usernameError").innerText = "Không được để trống";
                hasError = true;
            }

            if (!password) {
                document.getElementById("passwordError").innerText = "Không được để trống";
                hasError = true;
            }

            if (hasError) return;

            try {
                const response = await fetch("http://localhost:8080/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem("user", username);

                    if (result.data) {
                        localStorage.setItem("jwtToken", result.data);
                    }

                    document.getElementById("message").style.color = "green";
                    document.getElementById("message").innerText = "Đăng nhập thành công!"; // Ghi cứng chữ này luôn cho đẹp

                    setTimeout(() => {
                        window.location.href = "index.html"; 
                    }, 800);

                } else {
                    document.getElementById("message").style.color = "red";

                    if (result.data) {
                        if (result.data.username) {
                            document.getElementById("usernameError").innerText = result.data.username;
                        }
                        if (result.data.password) {
                            document.getElementById("passwordError").innerText = result.data.password;
                        }
                    } else {
                        document.getElementById("message").innerText = result.message || "Sai tài khoản hoặc mật khẩu!";
                    }
                }

            } catch (error) {
                document.getElementById("message").style.color = "red";
                document.getElementById("message").innerText = "Không kết nối được server!";
            }
        });
    </script>

</body>

</html>
