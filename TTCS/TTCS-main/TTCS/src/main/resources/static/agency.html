<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>House AI</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        .login {
            color: #666;
            transition: 0.3s;
        }

        .login:hover {
            color: #d89b3c;
        }

        .register {
            color: #666;
            transition: 0.3s;
        }

        .register:hover {
            color: #d89b3c;
        }

        body {
            height: 100vh;
            overflow: hidden;

            background:
                linear-gradient(rgba(245, 240, 235, 0.85), rgba(245, 240, 235, 0.85)),
                url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') no-repeat center/cover;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* PANEL */
        .overlay {
            width: 75%;
            max-width: 1100px;
            height: 90vh;

            padding: 20px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);

            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);

            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .logo {
            color: #d89b3c;
            font-weight: 600;
        }

        .nav a {
            margin-left: 15px;
            text-decoration: none;
            color: #666;
        }

        /* CARDS */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .card {
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.7);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .value {
            color: #d89b3c;
            font-weight: bold;
            margin: 5px 0;
        }

        canvas {
            height: 40px !important;
        }

        /* IMAGE GRID */
        .gallery {
            margin-top: 12px;
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
    </style>
</head>
