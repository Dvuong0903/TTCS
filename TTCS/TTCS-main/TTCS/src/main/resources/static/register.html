<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Dự đoán giá nhà</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #8ab2e6, #8ab2e6);
        }

        .register-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 380px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .register-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-box {
            margin-bottom: 12px;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .input-error {
            border-color: red;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-top: 3px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4d7be4;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #445dea;
        }

        .link {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        #message {
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="register-box">
        <h2>Đăng ký</h2>

        <form id="registerForm">

            <div class="input-box">
                <input type="text" id="fullname" placeholder="Họ và tên">
                <div id="fullnameError" class="error"></div>
            </div>

            <div class="input-box">
                <input type="text" id="username" placeholder="Tên đăng nhập">
                <div id="usernameError" class="error"></div>
            </div>

            <div class="input-box">
                <input type="email" id="email" placeholder="Email">
                <div id="emailError" class="error"></div>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Mật khẩu">
                <div id="passwordError" class="error"></div>
            </div>

            <div class="input-box">
                <input type="password" id="confirm" placeholder="Xác nhận mật khẩu">
                <div id="confirmError" class="error"></div>
            </div>

            <button class="btn" type="submit">Đăng ký</button>
        </form>

        <p id="message"></p>

        <div class="link">
            Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            // reset lỗi
            document.getElementById("message").innerText = "";
            ["fullname", "username", "email", "password", "confirm"].forEach(id => {
                document.getElementById(id + "Error").innerText = "";
                document.getElementById(id).classList.remove("input-error");
            });

            const data = {
                fullname: document.getElementById("fullname").value,
                username: document.getElementById("username").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                confirm: document.getElementById("confirm").value
            };

            try {
                const response = await fetch("http://localhost:8080/api/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                let result = {};
                try {
                    result = await response.json();
                } catch (e) { }

                if (response.ok) {
                    document.getElementById("message").style.color = "green";
                    document.getElementById("message").innerText = result.message;

                } else {
                    document.getElementById("message").style.color = "red";

                    if (result.data) {
                        for (let key in result.data) {
                            let errorField = document.getElementById(key + "Error");
                            let inputField = document.getElementById(key);

                            if (errorField) {
                                errorField.innerText = result.data[key];
                            }

                            if (inputField) {
                                inputField.classList.add("input-error");
                            }
                        }
                    } else {
                        document.getElementById("message").innerText = result.message || "Lỗi!";
                    }
                }

            } catch (error) {
                document.getElementById("message").innerText = "Không kết nối được server!";
            }
        });
    </script>

</body>

</html>
